<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hendriawan | Portfolio</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#fdfcfb] text-slate-900 font-sans antialiased">
    <nav
      class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="container mx-auto px-6 py-4 flex justify-between items-center"
      >
        <a href="#" class="font-display text-xl font-bold text-gradient"
          >Hendriawan</a
        >

        <ul class="hidden md:flex gap-8 text-sm font-medium text-slate-500">
          <li>
            <a href="#tentang" class="hover:text-slate-900 transition"
              >Tentang</a
            >
          </li>
          <li>
            <a href="#projek" class="hover:text-slate-900 transition">Projek</a>
          </li>
          <li>
            <a href="#skills" class="hover:text-slate-900 transition">Skills</a>
          </li>
          <li>
            <a href="#kontak" class="hover:text-slate-900 transition">Kontak</a>
          </li>
        </ul>

        <button
          id="hamburger"
          class="md:hidden flex flex-col gap-1.5 focus:outline-none"
        >
          <span
            class="w-6 h-0.5 bg-slate-900 transition-all duration-300"
          ></span>
          <span
            class="w-6 h-0.5 bg-slate-900 transition-all duration-300"
          ></span>
          <span
            class="w-6 h-0.5 bg-slate-900 transition-all duration-300"
          ></span>
        </button>
      </div>

      <div
        id="navLinks"
        class="hidden md:hidden bg-white border-b border-slate-200 px-6 py-4 gap-4 text-sm font-medium"
      >
        <a href="#tentang" class="hover:text-primary transition">Tentang</a>
        <a href="#projek" class="hover:text-primary transition">Projek</a>
        <a href="#skills" class="hover:text-primary transition">Skills</a>
        <a href="#kontak" class="hover:text-primary transition">Kontak</a>
      </div>
    </nav>

    <section class="min-h-screen flex items-center pt-20">
      <div
        class="container mx-auto px-6 flex flex-col-reverse md:flex-row items-center gap-12 text-center md:text-left"
      >
        <div class="flex-1" data-aos="fade-up">
          <p
            class="text-accent text-xs font-bold tracking-widest uppercase mb-3"
          >
            Web Developer
          </p>
          <h1
            class="font-display text-4xl md:text-6xl font-bold leading-tight mb-6"
          >
            Halo, saya <span class="text-gradient">Hendriawan</span>
          </h1>
          <p class="text-slate-500 text-lg max-w-lg mb-8 mx-auto md:mx-0">
            Fokus pada pengembangan sistem web berbasis PHP/Laravel yang aman
            dan efisien.
          </p>
          <div class="flex gap-4 justify-center md:justify-start">
            <a
              href="#kontak"
              class="bg-primary text-white px-6 py-3 rounded-lg font-medium hover:opacity-90"
              >Hubungi Saya</a
            >
            <a
              href="#projek"
              class="border border-slate-200 px-6 py-3 rounded-lg font-medium hover:bg-slate-50"
              >Lihat Projek</a
            >
          </div>
        </div>
        <div class="relative" data-aos="fade-up" data-aos-delay="200">
          <div
            class="w-48 h-48 md:w-64 md:h-64 rounded-2xl overflow-hidden border-2 border-slate-200 shadow-xl relative z-10 bg-slate-100"
          >
            <img
              src="me.jpg"
              alt="Hendriawan"
              class="w-full h-full object-cover"
            />
          </div>
          <div
            class="absolute -bottom-4 -right-4 w-48 h-48 md:w-64 md:h-64 rounded-2xl border-2 border-accent/30 -z-0"
          ></div>
        </div>
      </div>
    </section>

    <footer
      class="py-12 border-t border-slate-200 text-center text-slate-400 text-sm"
    >
      <p>&copy; 2026 Hendriawan. Portfolio Project.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
  </body>
</html>
